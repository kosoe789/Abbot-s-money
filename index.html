<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>မေဃဝတီဆရာတော်နှင့်ဆက်စပ် ဝင်ငွေ / ထွက်ငွေ မှတ်တမ်း</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-img-wrap">
        <img src="sd.jpg" alt="မေဃဝတီဆရာတော်" class="header-portrait" />
      </div>
      <div class="header-title">
        <h1>မေဃဝတီဆရာတော်နှင့်ဆက်စပ်</h1>
        <h2>ဝင်ငွေ / ထွက်ငွေ မှတ်တမ်း</h2>
      </div>
      <div class="header-img-wrap">
        <img src="sd.jpg" alt="မေဃဝတီဆရာတော်" class="header-portrait" />
      </div>
    </div>
  </header>

  <main class="container">

    <div class="summary-bar">
      <div class="summary-card income-card">
        <span class="summary-label">စုစုပေါင်း ဝင်ငွေ</span>
        <span class="summary-value" id="total-income">တွက်နေသည်...</span>
      </div>
      <div class="summary-card out-card">
        <span class="summary-label">စုစုပေါင်း ထွက်ငွေ</span>
        <span class="summary-value" id="total-outgoing">တွက်နေသည်...</span>
      </div>
      <div class="summary-card balance-card">
        <span class="summary-label">လက်ကျန်</span>
        <span class="summary-value" id="balance">တွက်နေသည်...</span>
      </div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label>🔍 ရှာဖွေရန်</label>
        <input type="text" id="search-input" placeholder="ရှာဖွေမည်..." oninput="applyFilters()" />
      </div>
      <div class="filter-group">
        <label>📋 အမျိုးအစား</label>
        <select id="type-filter" onchange="applyFilters()">
          <option value="">အားလုံး</option>
          <option value="ဝင်ငွေ">📈 ဝင်ငွေ</option>
          <option value="ထွက်ငွေ">📉 ထွက်ငွေ</option>
        </select>
      </div>
      <div class="filter-group">
        <label>👤 နာမည်ဖြင့်စစ်</label>
        <select id="col-filter" onchange="applyFilters()">
          <option value="">အားလုံး</option>
        </select>
      </div>
    </div>

    <div class="table-section">
      <div class="loading-msg" id="loading-main">
        <div class="spinner"></div> ဒေတာ ခေါ်နေသည်...
      </div>
      <div class="table-wrap">
        <table id="main-table">
          <thead id="main-thead"></thead>
          <tbody id="main-tbody"></tbody>
        </table>
      </div>
      <div class="no-data" id="nodata-main" style="display:none">ဒေတာ မတွေ့ပါ</div>
    </div>

    <p class="last-updated" id="last-updated"></p>
  </main>

  <footer class="site-footer">
    <p>ဒေတာကို Google Sheets မှ တိုက်ရိုက် ဆွဲယူသည်</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
